stages:
  - deploy

deploy:
  stage: deploy
  resource_group: dorna
  rules:
    - if: '$CI_COMMIT_BRANCH == "v1"'
  variables:
    APP_DIR: /var/www/dorna/app
    VENV_DIR: /var/www/dorna/app/.venv
    SERVICE_DORNA: "dorna.service"
    SERVICE_CELERY: "dorna-celery-worker.service"
    SERVICE_FLOWER: "dorna-flower.service"
  before_script:
    - set -euo pipefail
    - umask 002
    - cd "$APP_DIR"
  script:
    # keep working tree exactly on the branch head
    - git fetch --prune
    - git reset --hard "origin/$CI_COMMIT_BRANCH"

    # ensure Poetry exists (pipx is fine on runners)
    - poetry --version || pipx install poetry

    # Poetry: create venv in the project and use Python 3.12
    - poetry config virtualenvs.create true
    - poetry config virtualenvs.in-project true
    - poetry env use /usr/bin/python3.12 || poetry env use python3.12

    # install exactly from poetry.lock (no prompts/ANSI in CI)
    - poetry install --no-interaction --no-ansi

    # Upgrade Alembic head in each CI
    - poetry run alembic upgrade head
    
    # restart app
    - sudo /usr/bin/systemctl restart "${SERVICE_DORNA}"
    - sudo /usr/bin/systemctl status "${SERVICE_DORNA}"

    - sudo /usr/bin/systemctl restart "${SERVICE_CELERY}"
    - sudo /usr/bin/systemctl status "${SERVICE_CELERY}"

    - sudo /usr/bin/systemctl restart "${SERVICE_FLOWER}"
    - sudo /usr/bin/systemctl status "${SERVICE_FLOWER}"