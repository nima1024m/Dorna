<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dorna — English companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #dde6ee;
    background-image: radial-gradient(circle at 30% 0%, #e8eff6, #d2dce6);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #stage { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  #root { transform-origin: center center; }
  .material-symbols-outlined {
    font-family: 'Material Symbols Outlined';
    font-weight: normal; font-style: normal; line-height: 1;
    letter-spacing: normal; text-transform: none; display: inline-block;
    white-space: nowrap; word-wrap: normal; direction: ltr;
    -webkit-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased;
  }
  .no-sb::-webkit-scrollbar { display: none; }
  .no-sb { scrollbar-width: none; -ms-overflow-style: none; }
  .dorna-root ::-webkit-scrollbar { width: 0; height: 0; }
  .dorna-root *::-webkit-scrollbar { display: none; }

  @keyframes wv { 0%, 100% { height: 22%; } 50% { height: 100%; } }
  @keyframes ping { 0% { transform: scale(1); opacity: .7; } 100% { transform: scale(1.45); opacity: 0; } }
  @keyframes pop { 0% { transform: translateX(-50%) scale(.85); opacity: 0; } 100% { transform: translateX(-50%) scale(1); opacity: 1; } }
  @keyframes screenIn { from { transform: translateX(18px); } to { transform: translateX(0); } }
  @keyframes screenInBack { from { transform: translateX(-18px); } to { transform: translateX(0); } }
  .screen-enter { animation: screenIn .26s cubic-bezier(.22,1,.36,1); }
  .screen-enter-back { animation: screenInBack .26s cubic-bezier(.22,1,.36,1); }
  @media (prefers-reduced-motion: reduce) {
    .screen-enter, .screen-enter-back { animation: none; }
  }
  @keyframes bubbleRise { from { transform: translateY(9px); } to { transform: translateY(0); } }
  .bubble-rise { animation: bubbleRise .35s cubic-bezier(.22,1,.36,1); }
  @keyframes dotPulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: .5; } }
  .dot-pulse { animation: dotPulse 1.1s ease-in-out infinite; }
</style>
</head>
<body>
<div id="stage"><div id="root"></div></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" rx="22" fill="#0B5390"/>
    <g transform="translate(50 46)" stroke="#7fe3f5" stroke-width="5" stroke-linecap="round">
      <line x1="-9" y1="-12" x2="-9" y2="12"/>
      <line x1="0" y1="-17" x2="0" y2="17"/>
      <line x1="9" y1="-12" x2="9" y2="12"/>
    </g>
    <path d="M30 72 q10 -7 20 0 t20 0" stroke="#34c6e6" stroke-width="4" fill="none" stroke-linecap="round"/>
  </svg>
</template>

<script type="text/babel" src="dorna/tweaks-panel.jsx"></script>
<script type="text/babel" src="dorna/ios-frame.jsx"></script>
<script type="text/babel" src="dorna/data.jsx"></script>
<script type="text/babel" src="dorna/ui.jsx"></script>
<script type="text/babel" src="dorna/screens-onboarding.jsx"></script>
<script type="text/babel" src="dorna/screens-connect.jsx"></script>
<script type="text/babel" src="dorna/screens-home.jsx"></script>
<script type="text/babel" src="dorna/screens-prep.jsx"></script>
<script type="text/babel" src="dorna/screens-practice.jsx"></script>
<script type="text/babel" src="dorna/screens-profile.jsx"></script>
<script type="text/babel" src="dorna/app.jsx"></script>
<script type="text/babel" data-presets="react">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);

  // scale the phone to fit the viewport
  function fit() {
    const el = document.getElementById('root');
    if (!el) return;
    const W = 402, H = 874;
    const s = Math.min((window.innerWidth - 24) / W, (window.innerHeight - 24) / H, 1);
    el.style.transform = `scale(${s})`;
  }
  window.addEventListener('resize', fit);
  setTimeout(fit, 60); setTimeout(fit, 300);
</script>
</body>
</html>
