</div>

</div>

<script>
        // Simple micro-interaction for audio button
        const audioBtn = document.querySelector('button:contains("Hear it")');
        if(audioBtn) {
            audioBtn.addEventListener('click', () => {
                audioBtn.classList.add('opacity-50');
                setTimeout(() => audioBtn.classList.remove('opacity-50'), 300);
            });
        }

        // Horizontal scroll sync for dots (Conceptual for prototype)
        const container = document.querySelector('.carousel-container');
        container.scrollLeft = 280; // Start centered on card 2
