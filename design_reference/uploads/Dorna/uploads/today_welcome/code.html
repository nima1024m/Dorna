        }

</header>

<!-- Hero: 5-min Brief Card -->
<section class="relative">
<div class="signature-gradient rounded-3xl p-6 text-white shadow-lg overflow-hidden relative group active:scale-[0.98] transition-all">
<!-- Subtle Wave Pattern Decoration -->
<div class="absolute top-0 right-0 opacity-10 pointer-events-none transform translate-x-1/4 -translate-y-1/4 scale-150">
<span class="material-symbols-outlined text-[120px]">graphic_eq</span>
</div>
<div class="flex justify-between items-start relative z-10">
<div class="bg-white/20 backdrop-blur-md px-3 py-1 rounded-full flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">timer</span>
<span class="font-label-lg text-[12px] uppercase tracking-wider">5 min</span>
</div>
</div>
<div class="mt-8 relative z-10">
<h2 class="font-headline-lg text-headline-lg font-extrabold leading-tight">Your 5-min brief</h2>
<p class="font-body-md text-body-md opacity-90 mt-2">Daily English insights for your life in Canada.</p>
</div>
<div class="mt-8 flex justify-end relative z-10">
<button class="w-14 h-14 bg-white rounded-full flex items-center justify-center text-primary shadow-xl hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
</div>
</section>
<!-- Today's Plan: Empty State Section -->
<section class="flex-1 flex flex-col">
<div class="flex items-center justify-between mb-4">

<button class="text-primary font-label-lg text-label-lg">Connect</button>

<p class="font-body-md text-body-md text-on-surface-variant px-4 mb-6">Connect your calendar to get prep before meetings and events</p>
<button class="border-2 border-secondary text-secondary rounded-full px-8 py-3 font-label-lg text-label-lg hover:bg-secondary/5 transition-colors active:scale-95">
                        Connect calendar
                    </button>
</div>
</section>

<div class="bg-white p-2 rounded-xl shadow-sm text-secondary">
<span class="material-symbols-outlined">location_on</span>
</div>
<div class="flex-1">
<p class="font-body-md text-body-md text-on-surface-variant leading-tight">
                        Turn on location for tips near you. 
                        <a class="text-secondary font-bold ml-1 hover:underline" href="#">Enable location</a>
</p>
</div>
</section>
</main>

<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-margin-mobile h-20 bg-surface shadow-[0_-4px_20px_rgba(0,0,0,0.05)] rounded-t-3xl">

<div class="w-12 h-8 rounded-full bg-primary-container flex items-center justify-center transition-all group-active:scale-90">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_circle</span>
</div>

</div>
<span class="font-label-lg text-[10px] text-on-surface-variant">Profile</span>
</button>

<script>
        // Simple Micro-interactions
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                btn.style.transform = 'scale(0.95)';
                setTimeout(() => btn.style.transform = 'scale(1)', 100);
            });
        });
    </script>
