name: Backend migrations

# Guards against schema drift: on every backend change we build the schema from
# migrations on a throwaway Postgres, then assert the ORM models and the
# migrations are in sync. This is what keeps "SQLAlchemy vs database" aligned.

on:
  pull_request:
    paths:
      - backend/**
  push:
    branches: [main, v1]
    paths:
      - backend/**

jobs:
  migrations:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dorna_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/dorna_ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install migration dependencies
        run: |
          python -m pip install --upgrade pip
          # Curated subset that is enough to import the models and run Alembic.
          # Kept minimal so the drift gate is fast and independent of the full
          # (LLM / cloud) dependency tree. Version bounds mirror pyproject.toml.
          pip install \
            "sqlalchemy>=2.0.51,<3" \
            "alembic>=1.18.4,<2" \
            "asyncpg>=0.31.0,<1" \
            "greenlet>=3.5.1,<4" \
            "pydantic>=2.13.4,<3" \
            "pydantic-settings>=2.14.1,<3" \
            "python-dotenv>=1.2.2,<2"

      - name: Build schema from migrations (fresh database)
        run: alembic upgrade head

      - name: Assert models and migrations are in sync
        run: alembic check
